<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patch Merger</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--surf:#13161d;--surf2:#1a1e27;
  --br:rgba(255,255,255,0.08);--br2:rgba(255,255,255,0.18);
  --tx:#e8eaf0;--mu:#5a6070;
  --acc:#f97316;--acc-d:rgba(249,115,22,0.13);
  --grn:#22c55e;--grn-d:rgba(34,197,94,0.13);
  --blu:#60a5fa;--blu-d:rgba(96,165,250,0.13);
  --red:#f87171;--red-d:rgba(248,113,113,0.13);
  --pur:#c084fc;--pur-d:rgba(192,132,252,0.13);
  --r:8px;--r2:12px;
  --mono:ui-monospace,'Cascadia Code','Consolas','Menlo',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:var(--mono);font-size:13px;min-height:100vh;line-height:1.6}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),
             linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);
  background-size:44px 44px}

.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* header */
.logo{font-size:26px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
.logo em{color:var(--acc);font-style:normal}
.sub{font-size:11px;color:var(--mu);margin-bottom:2.5rem}

/* section label */
.lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.lbl::after{content:'';flex:1;height:1px;background:var(--br)}

/* drop zone */
.drop{border:1.5px dashed var(--br2);border-radius:var(--r2);background:var(--surf);
  padding:2.5rem 2rem;text-align:center;cursor:pointer;
  transition:border-color .2s,background .2s;position:relative}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer}
.drop:hover,.drop.over{border-color:var(--acc);background:var(--acc-d)}
.drop-ico{font-size:28px;display:block;margin-bottom:8px}
.drop-t{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:4px}
.drop-s{font-size:11px;color:var(--mu)}

/* empty */
.empty{text-align:center;padding:2rem;color:var(--mu);font-size:12px;
  border:1px dashed var(--br);border-radius:var(--r2);background:var(--surf);margin-top:10px}

/* list */
.list{display:flex;flex-direction:column;gap:6px;margin-top:10px}

.item{background:var(--surf);border:1px solid var(--br);border-radius:var(--r);
  padding:10px 12px;display:grid;grid-template-columns:20px 1fr auto auto;
  align-items:center;gap:10px;user-select:none;transition:border-color .15s,background .15s}
.item:hover{border-color:var(--br2)}
.item.dragging{opacity:.35}
.item.over{border-color:var(--acc);background:var(--acc-d)}

.grip{color:var(--mu);cursor:grab;display:flex;align-items:center}
.grip:active{cursor:grabbing}

.info{min-width:0}
.name{font-weight:700;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta{font-size:10px;color:var(--mu);display:flex;gap:8px;align-items:center;margin-top:2px;flex-wrap:wrap}

.tag{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:1px 6px;border-radius:3px}
.t-json{background:var(--blu-d);color:var(--blu);border:1px solid rgba(96,165,250,.2)}
.t-js  {background:var(--acc-d);color:var(--acc);border:1px solid rgba(249,115,22,.2)}
.t-css {background:var(--grn-d);color:var(--grn);border:1px solid rgba(34,197,94,.2)}
.t-html{background:var(--pur-d);color:var(--pur);border:1px solid rgba(192,132,252,.2)}

.btns{display:flex;gap:4px}
.ib,.db{background:transparent;border:1px solid var(--br);color:var(--mu);
  width:28px;height:28px;border-radius:5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:13px;
  transition:background .15s,color .15s,border-color .15s}
.ib:hover{background:var(--surf2);color:var(--tx);border-color:var(--br2)}
.ib:disabled{opacity:.28;cursor:default}
.db:hover{background:var(--red-d);color:var(--red);border-color:rgba(248,113,113,.3)}

/* output bar */
.out-bar{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;margin-top:10px}
.fn-wrap{position:relative}
.fn-in{width:100%;background:var(--surf);border:1px solid var(--br);border-radius:var(--r);
  color:var(--tx);font-family:var(--mono);font-size:13px;padding:9px 36px 9px 12px;outline:none;transition:border-color .2s}
.fn-in:focus{border-color:var(--acc)}
.fn-ext{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--mu);pointer-events:none}

.btn{font-family:var(--mono);font-size:12px;font-weight:700;padding:9px 16px;
  border-radius:var(--r);cursor:pointer;border:1px solid;transition:all .15s;
  white-space:nowrap;display:flex;align-items:center;gap:6px}
.b-pre{background:transparent;color:var(--blu);border-color:rgba(96,165,250,.3)}
.b-pre:hover{background:var(--blu-d);border-color:var(--blu)}
.b-exp{background:var(--acc);color:#000;border-color:var(--acc);font-weight:800}
.b-exp:hover{background:#e8680a;border-color:#e8680a}
.b-exp:disabled{background:var(--surf2);color:var(--mu);border-color:var(--br);cursor:not-allowed}
.b-cpy{background:transparent;color:var(--grn);border-color:rgba(34,197,94,.3);font-size:11px;padding:5px 10px}
.b-cpy:hover{background:var(--grn-d)}

/* preview */
.prev-wrap{margin-top:10px;background:var(--surf);border:1px solid var(--br);border-radius:var(--r2);overflow:hidden}
.prev-hd{padding:9px 14px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between}
.prev-lbl{font-size:10px;font-weight:700;color:var(--mu);letter-spacing:1px;text-transform:uppercase}
.stats{display:flex;gap:12px}
.stat{font-size:10px;color:var(--mu)}
.stat strong{color:var(--tx)}
.code{font-family:var(--mono);font-size:11.5px;line-height:1.65;color:#c9d1d9;
  padding:1rem 1.25rem;overflow:auto;max-height:440px;white-space:pre;background:transparent}

.gap{margin-top:2rem}

/* toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surf2);
  border:1px solid;font-family:var(--mono);font-size:12px;
  padding:9px 15px;border-radius:var(--r);opacity:0;transform:translateY(6px);
  transition:opacity .2s,transform .2s;pointer-events:none;z-index:99}
.toast.on{opacity:1;transform:none}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--br2);border-radius:3px}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">patch<em>.</em>merge <span style="font-size:11px;font-weight:400;color:var(--mu)">v3</span></div>
  <div class="sub">// load patches, set order, export as one clean .js file</div>

  <div class="lbl">01 — load patches</div>
  <div class="drop" id="dz">
    <input type="file" id="fi" multiple accept=".js,.json">
    <span class="drop-ico">⬡</span>
    <div class="drop-t">Drop patch files here</div>
    <div class="drop-s">Accepts .js and .json — drop multiple at once</div>
  </div>

  <div class="empty" id="emp">No patches loaded yet.</div>
  <div class="list" id="lst" style="display:none"></div>

  <div class="gap">
    <div class="lbl">02 — output filename</div>
    <div class="out-bar">
      <div class="fn-wrap">
        <input class="fn-in" type="text" id="fn" value="update" placeholder="filename">
        <span class="fn-ext">.js</span>
      </div>
      <button class="btn b-pre" onclick="preview()">⚡ preview</button>
      <button class="btn b-exp" id="expbtn" onclick="doExport()" disabled>↓ export</button>
    </div>
  </div>

  <div id="prevsec" style="display:none">
    <div class="gap">
      <div class="lbl">03 — merged output</div>
      <div class="prev-wrap">
        <div class="prev-hd">
          <div class="prev-lbl">preview</div>
          <div style="display:flex;align-items:center;gap:10px">
            <div class="stats" id="stats"></div>
            <button class="btn b-cpy" onclick="doCopy()">⎘ copy</button>
          </div>
        </div>
        <pre class="code" id="out"></pre>
      </div>
    </div>
  </div>

</div>
<div class="toast" id="tst"></div>

<script>
// ─────────────────────────────────────────────
// State
// ─────────────────────────────────────────────
const patches = [];
let dragSrc = null;
let lastMerged = '';

// ─────────────────────────────────────────────
// Drop zone
// ─────────────────────────────────────────────
const dz = document.getElementById('dz');
const fi = document.getElementById('fi');

dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); loadFiles(e.dataTransfer.files); });
fi.addEventListener('change', () => { loadFiles(fi.files); fi.value = ''; });

function loadFiles(files) {
  Array.from(files).forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      const raw = ev.target.result;
      const isJson = file.name.toLowerCase().endsWith('.json');
      let parsed = null;
      if (isJson) {
        try { parsed = JSON.parse(raw); }
        catch { toast('Cannot parse ' + file.name, 1); return; }
      }
      patches.push({ id: Date.now() + Math.random(), name: file.name, raw, parsed, isJson, size: file.size });
      render();
      toast('+ ' + file.name);
    };
    r.readAsText(file);
  });
}

// ─────────────────────────────────────────────
// Render list
// ─────────────────────────────────────────────
function render() {
  const lst = document.getElementById('lst');
  const emp = document.getElementById('emp');
  document.getElementById('expbtn').disabled = patches.length === 0;

  if (!patches.length) { lst.style.display = 'none'; emp.style.display = ''; return; }
  lst.style.display = 'flex'; emp.style.display = 'none';

  lst.innerHTML = patches.map((p, i) => {
    const kb = p.size < 1024 ? p.size + ' B' : (p.size / 1024).toFixed(1) + ' KB';
    const tags = getTags(p);
    return `
    <div class="item" draggable="true" data-i="${i}"
         ondragstart="ds(event,${i})" ondragover="dov(event,${i})"
         ondrop="ddr(event,${i})" ondragend="de()">
      <div class="grip">
        <svg width="9" height="13" viewBox="0 0 9 13"><circle cx="2.5" cy="2" r="1.5" fill="currentColor"/>
        <circle cx="6.5" cy="2" r="1.5" fill="currentColor"/><circle cx="2.5" cy="6.5" r="1.5" fill="currentColor"/>
        <circle cx="6.5" cy="6.5" r="1.5" fill="currentColor"/><circle cx="2.5" cy="11" r="1.5" fill="currentColor"/>
        <circle cx="6.5" cy="11" r="1.5" fill="currentColor"/></svg>
      </div>
      <div class="info">
        <div class="name">${esc(p.name)}</div>
        <div class="meta">
          <span>${kb}</span>
          ${p.parsed && p.parsed.version ? '<span>v' + esc(p.parsed.version) + '</span>' : ''}
          ${tags}
        </div>
      </div>
      <div class="btns">
        <button class="ib" onclick="mv(${i},-1)" ${i===0?'disabled':''}>↑</button>
        <button class="ib" onclick="mv(${i},1)"  ${i===patches.length-1?'disabled':''}>↓</button>
        <button class="db" onclick="rm(${i})">✕</button>
      </div>
      <div style="font-size:9px;font-weight:700;background:var(--surf2);border:1px solid var(--br);
           color:var(--mu);width:18px;height:18px;border-radius:3px;display:flex;
           align-items:center;justify-content:center">${i+1}</div>
    </div>`;
  }).join('');
}

function getTags(p) {
  if (!p.isJson) return '<span class="tag t-js">JS</span>';
  let t = '<span class="tag t-json">JSON</span>';
  if (p.parsed) {
    if (p.parsed.css) t += ' <span class="tag t-css">CSS</span>';
    if (p.parsed.js)  t += ' <span class="tag t-js">JS</span>';
    if (p.parsed.html && p.parsed.html.length) t += ' <span class="tag t-html">HTML</span>';
  }
  return t;
}

function mv(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= patches.length) return;
  [patches[i], patches[j]] = [patches[j], patches[i]];
  render();
}
function rm(i) { patches.splice(i, 1); render(); document.getElementById('prevsec').style.display = 'none'; }

// ─────────────────────────────────────────────
// Drag-to-reorder
// ─────────────────────────────────────────────
function ds(e, i) { dragSrc = i; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; }
function dov(e, i) {
  e.preventDefault();
  document.querySelectorAll('.item').forEach(el => el.classList.remove('over'));
  if (i !== dragSrc) document.querySelector(`[data-i="${i}"]`).classList.add('over');
}
function ddr(e, i) {
  e.preventDefault();
  if (dragSrc !== null && dragSrc !== i) {
    const [item] = patches.splice(dragSrc, 1);
    patches.splice(i, 0, item);
    render();
  }
}
function de() { dragSrc = null; document.querySelectorAll('.item').forEach(el => el.classList.remove('dragging','over')); }

// ─────────────────────────────────────────────
// Merge
//
// JSON patch  →  handled in 3 separate blocks:
//   1) CSS: create <style>, set textContent (JSON.stringify = safe escaping)
//   2) HTML ops: array literal via JSON.stringify, forEach apply
//   3) JS: emit the js field RAW — it's already valid JS (IIFEs, etc.)
//
// JS file     →  emit RAW, untouched, verbatim
//
// Nothing is wrapped in an outer IIFE.
// Nothing is indented or reformatted.
// ─────────────────────────────────────────────
function buildMerged() {
  const fn = (document.getElementById('fn').value.trim() || 'update').replace(/\.js$/, '');
  const now = new Date().toISOString().slice(0, 10);
  const names = patches.map(p => p.name).join(', ');

  const SEP = '═'.repeat(55);
  let out = `/* ${SEP}\n   ${fn}.js — Merged Patch Bundle\n   Generated: ${now}\n   Sources:   ${names}\n   ${SEP} */\n`;

  for (const p of patches) {
    out += `\n\n/* ${'─'.repeat(24)} ${p.name} ${'─'.repeat(24)} */\n`;

    if (p.isJson && p.parsed) {
      // ── 1. CSS ──────────────────────────────────────────────
      if (p.parsed.css) {
        // JSON.stringify produces a valid JS string literal.
        // No manual escaping needed — handles \n, \t, quotes, unicode, everything.
        out += `(function(){\n`;
        out += `  var _s = document.createElement('style');\n`;
        out += `  _s.setAttribute('data-patch', ${JSON.stringify(p.name)});\n`;
        out += `  _s.textContent = ${JSON.stringify(p.parsed.css)};\n`;
        out += `  document.head.appendChild(_s);\n`;
        out += `})();\n`;
      }

      // ── 2. HTML ops ─────────────────────────────────────────
      if (p.parsed.html && p.parsed.html.length) {
        // JSON.stringify the whole array — handles all string content safely.
        out += `(function(){\n`;
        out += `  var ops = ${JSON.stringify(p.parsed.html)};\n`;
        out += `  ops.forEach(function(op){\n`;
        out += `    var el = document.querySelector(op.selector);\n`;
        out += `    if (!el) { console.warn('[${fn}] selector not found:', op.selector); return; }\n`;
        out += `    var pos = op.position || 'afterend';\n`;
        out += `    if      (op.action === 'replace')   { el.outerHTML = op.content; }\n`;
        out += `    else if (op.action === 'innerHTML')  { el.innerHTML = op.content; }\n`;
        out += `    else if (op.action === 'insert')     { el.insertAdjacentHTML(pos, op.content); }\n`;
        out += `    else if (op.action === 'remove')     { el.remove(); }\n`;
        out += `    else if (op.action === 'attr')       { var kv=op.content.split('='); el.setAttribute(kv[0].trim(),kv[1].trim()); }\n`;
        out += `  });\n`;
        out += `})();\n`;
      }

      // ── 3. JS ────────────────────────────────────────────────
      // Emit completely raw — zero modification.
      // The js field is already valid JS code (IIFEs, expressions, etc.).
      // Do NOT wrap, indent, or escape anything.
      if (p.parsed.js) {
        out += p.parsed.js;
        if (!p.parsed.js.endsWith('\n')) out += '\n';
      }

    } else {
      // ── Raw .js file — completely verbatim, zero modification ──
      out += p.raw;
      if (!p.raw.endsWith('\n')) out += '\n';
    }
  }

  return out;
}

// ─────────────────────────────────────────────
// Preview — show plain text, no HTML markup
// ─────────────────────────────────────────────
function preview() {
  if (!patches.length) { toast('No patches loaded', 1); return; }
  lastMerged = buildMerged();
  const lines = lastMerged.split('\n').length;
  const bytes = new TextEncoder().encode(lastMerged).length;
  const sz = bytes < 1024 ? bytes + ' B' : (bytes / 1024).toFixed(1) + ' KB';

  document.getElementById('stats').innerHTML =
    `<div class="stat"><strong>${patches.length}</strong> sources</div>
     <div class="stat"><strong>${lines}</strong> lines</div>
     <div class="stat"><strong>${sz}</strong></div>`;

  // textContent — plain text, no HTML parsing, no escaping issues, no "tok-comment"
  document.getElementById('out').textContent = lastMerged;
  document.getElementById('prevsec').style.display = '';
  document.getElementById('prevsec').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ─────────────────────────────────────────────
// Export
// ─────────────────────────────────────────────
function doExport() {
  if (!patches.length) return;
  lastMerged = buildMerged();
  const fn = (document.getElementById('fn').value.trim() || 'update').replace(/\.js$/, '') + '.js';
  const blob = new Blob([lastMerged], { type: 'text/javascript' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = fn; a.click();
  URL.revokeObjectURL(url);
  toast('Downloaded ' + fn);
  // Also update preview
  document.getElementById('out').textContent = lastMerged;
  document.getElementById('prevsec').style.display = '';
}

// ─────────────────────────────────────────────
// Copy
// ─────────────────────────────────────────────
function doCopy() {
  // Use lastMerged string directly — not innerHTML, not textContent
  if (!lastMerged) lastMerged = buildMerged();
  navigator.clipboard.writeText(lastMerged).then(() => toast('Copied'));
}

// ─────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let _tt;
function toast(msg, err) {
  const t = document.getElementById('tst');
  t.textContent = msg;
  t.style.color = err ? 'var(--red)' : 'var(--grn)';
  t.style.borderColor = err ? 'var(--red)' : 'var(--grn)';
  t.classList.add('on');
  clearTimeout(_tt);
  _tt = setTimeout(() => t.classList.remove('on'), 2000);
}
</script>
</body>
</html>
